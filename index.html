<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Casa Imaginada Cooperativa</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Georgia, serif;
      background-color: #fafaf8;
      color: #222;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .contenedor {
      max-width: 600px;
      width: 100%;
      text-align: center;
    }

    .acento {
      color: #0aa3bb;
    }

    h1 {
      font-size: 2rem;
      font-weight: normal;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .subtitulo {
      font-size: 0.95rem;
      color: #888;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 3rem;
    }

    p {
      font-size: 1rem;
      line-height: 1.8;
      color: #555;
      margin-bottom: 3rem;
    }

    .proyectos {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 3rem;
    }

    .proyectos a {
      color: #0aa3bb;
      text-decoration: none;
      font-size: 0.95rem;
      letter-spacing: 0.05em;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }

    .proyectos a:hover {
      border-bottom-color: #0aa3bb;
    }

    .pie {
      font-size: 0.8rem;
      color: #bbb;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div class="contenedor">

    <h1><span class="acento">Casa</span> Imaginada</h1>
    <p class="subtitulo">Cooperativa Cultural · Córdoba</p>

    <p>Producimos narrativas en diversos soportes y lenguajes.<br>
    Apostamos por los derechos de las infancias, la cultura libre<br>
    y la construcción comunitaria.</p>

    <div class="proyectos">
      <a href="#">Ediciones de la Terraza</a>
      <a href="#">Traficante de Libros</a>
      <a href="#">Artilugio</a>
      <a href="#">Casa Rodante</a>
    </div>

    <p class="pie">Sitio en construcción · 2026</p>

  </div>
</body>
</html>
